name: Stable platform

on:
  workflow_dispatch:
    inputs:
      vc_docker_branch:
        description: 'vc-docker branch'
        required: true
        default: 'feat/net10'
        type: choice
        options:
          - feat/net8
          - feat/net10
  push:
    paths:
      - 'bundles/latest/**'
    branches: 
      - 'master'

jobs:
  ci:
    runs-on: ubuntu-latest
    outputs:
      BUNDLE_VERSION: ${{ steps.getBundleVersion.outputs.BUNDLE_VERSION }}
      vulnSkipList: ${{ steps.vulnSkipList.outputs.vulnSkipList }}
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        persist-credentials: true


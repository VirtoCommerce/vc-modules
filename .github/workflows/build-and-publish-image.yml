    #       Write-Host "BundleVersion was not changed in the last commit. Bumping the version..."
    #       $packageJson = Get-Content ./bundles/latest/package.json | ConvertFrom-Json
    #       $oldVersion = $packageJson.BundleVersion
    #       $bumpVersion = [System.Version]::new($oldVersion.Major, $oldVersion.Minor, $oldVersion.Build + 1)
    #       $packageJson.BundleVersion = $bumpVersion.ToString()
    #       $packageJson | ConvertTo-Json -Depth 10 | Set-Content ./bundles/latest/package.json
    #       Write-Host "New BundleVersion: $bumpVersion. Committing and pushing..."
    #       git add ./bundles/latest/package.json
    #       if ($lastExitCode -ne 0) { throw "Failed to add file to git" }
    #       git commit -m "[skip ci] Automatic BundleVersion bump to $bumpVersion"
    #       if ($lastExitCode -ne 0) { throw "Failed to commit changes" }
    #       git push
    #       if ($lastExitCode -ne 0) { throw "Failed to push changes" }
    #       Write-Host "Committed and pushed successfully"
    #     } else {
    #       Write-Host "BundleVersion was changed from $oldVersion to $newVersion"
    #     }

    - name: Get bundle version
      id: getBundleVersion
      shell: pwsh
      run: |
        $bundleVersion = (Get-Content ./bundles/latest/package.json | ConvertFrom-Json).BundleVersion
        echo "BUNDLE_VERSION=$bundleVersion"
        if ($bundleVersion -eq $null) {
          throw "Bundle version is null"
        } else {
          echo "BUNDLE_VERSION=$bundleVersion" >> $env:GITHUB_ENV
          echo "BUNDLE_VERSION=$bundleVersion" >> $env:GITHUB_OUTPUT
        }
  
    - name: Az config
      run: |
        az config set extension.use_dynamic_install=yes_without_prompt
    
    - name: Install vc-build
      run: |
        dotnet tool install --global VirtoCommerce.GlobalTool

    - name: Pack
      run: |
        vc-build install -PackageManifestPath ./bundles/latest/package.json -ProbingPath ./backend/platform/app_data/modules -DiscoveryPath ./backend/platform/modules --root ./backend/platform -SkipDependencySolving

    - name: Get Dockerfile
      run: |
        git clone -b ${{ inputs.vc_docker_branch || 'feat/net10' }} https://github.com/VirtoCommerce/vc-docker.git
        mv ./backend/platform ./vc-docker/linux/platform/publish

    - name: Build tarball file
      working-directory: ./vc-docker/linux/platform
      run: |
        docker build -t local-platform:$TAG .
        docker save -o $TAG.tar local-platform:$TAG
      env:
        TAG: ${{ env.BUNDLE_VERSION }}-stable

    - name: Upload Docker image tarball
      uses: actions/upload-artifact@v4
      with:
        name: image-4test
        path: ./vc-docker/linux/platform/${{ env.BUNDLE_VERSION }}-stable.tar
        retention-days: 1

    - name: Extract vulnerabilities skip list
      id: vulnSkipList
      shell: pwsh
      run: |
        $vulnSkipList = @()
        $skipList = (Get-Content ./trivyScan-ignore.json | ConvertFrom-Json)
        foreach ($vulnerability in $skipList.PSObject.Properties.Name){
          echo "Adding '$vulnerability' with '$($skipList.$vulnerability.Severity)' severity entry to trivy scan ignore list"
          $vulnSkipList += $($skipList.$vulnerability.VulnerabilityID)
        }
        $stringSkipList = $vulnSkipList -join ","
        echo "vulnSkipList=$stringSkipList" >> $env:GITHUB_OUTPUT

  trivy-scan:
    needs: 'ci'
    uses: VirtoCommerce/.github/.github/workflows/docker-image-vulnerability-process.yml@v3.800.30
    with:
      assigneeAccountId: '621c47c0302c6b006af0a1cd'
      assigneeEmailAddress: 'andrew.kubyshkin@virtoworks.com'
      exitCodeOnFoundVulnerabilities: '1'
      imageRef: 'virtopaasregistrymain.azurecr.io'
      imageTag: ${{ needs.ci.outputs.BUNDLE_VERSION }}-stable
      imageTarName: 'image-4test'
      jiraProject: 'VCST'
      trivyMode: 'tarball'
      vulnerabilitySkipList: ${{ needs.ci.outputs.vulnSkipList }}
    secrets:
      JIRA_USER: ${{ secrets.JIRA_USER }}
      JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}

  smoke-test:
    needs: 'ci'
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.ci.outputs.BUNDLE_VERSION }}-stable
    steps:
    - name: Mask database password
      run: |
        pw='SmokeTest_${{ github.run_id }}'
        echo "::add-mask::$pw"
        echo "PG_PASSWORD=$pw" >> "$GITHUB_ENV"

    - name: Download Docker image tarball
      uses: actions/download-artifact@v4
      with:
        name: 'image-4test'

    - name: Load Docker image
      run: docker load -i "$TAG.tar"

    - name: Create Docker network
      run: docker network create vc-smoke

    - name: Start PostgreSQL
      run: |
        docker run -d --name vc-db --network vc-smoke \
          -e "POSTGRES_PASSWORD=$PG_PASSWORD" \
          -e POSTGRES_DB=virtocommerce3 \
          --health-cmd="pg_isready -U postgres" \
          --health-interval=2s \
          --health-retries=30 \
          postgres:18.3

    - name: Wait for PostgreSQL
      run: |
        for i in $(seq 1 60); do
          if [ "$(docker inspect -f '{{.State.Health.Status}}' vc-db)" = "healthy" ]; then
            echo "PostgreSQL ready after $((i*2))s"
            exit 0
          fi
          sleep 2
        done
        echo "::error::PostgreSQL did not become ready within 120s"
        docker logs vc-db
        exit 1

    - name: Start platform container
      run: |
        docker run -d --name vc-platform --network vc-smoke \
          -p 8090:80 \
          -e DatabaseProvider=PostgreSql \
          -e "ConnectionStrings__VirtoCommerce=User ID=postgres;Password=$PG_PASSWORD;Host=vc-db;Port=5432;Database=virtocommerce3;" \
          -e VirtoCommerce__AllowInsecureHttp=true \
          "local-platform:$TAG"

    - name: Wait for platform /health
      run: |
        for i in $(seq 1 50); do
          status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8090/health || echo "000")
          if [ "$status" = "200" ]; then
            echo "Platform healthy after $((i*5))s"
            curl -s http://localhost:8090/health
            echo
            exit 0
          fi
          echo "Attempt $i: status=$status"
          sleep 5
        done
        echo "::error::Platform did not become healthy within 250s"
        exit 1

    - name: Verify installed modules
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path ./scripts | Out-Null
        $base = 'https://raw.githubusercontent.com/VirtoCommerce/vc-github-actions/master/docker-env/scripts'
        Invoke-WebRequest -Uri "$base/watch-url-up.ps1" -OutFile ./scripts/watch-url-up.ps1
        Invoke-WebRequest -Uri "$base/check-installed-modules.ps1" -OutFile ./scripts/check-installed-modules.ps1
        & ./scripts/check-installed-modules.ps1 `
          -ApiUrl http://localhost:8090 `
          -ContainerId vc-platform `
          -watchUrlScriptPath ./scripts/watch-url-up.ps1

    - name: Dump container logs
      if: always()
      run: |
        echo "::group::Platform logs"
        docker logs vc-platform || true
        echo "::endgroup::"
        echo "::group::PostgreSQL logs"
        docker logs vc-db || true
        echo "::endgroup::"

    - name: Tear down
      if: always()
      run: |
        docker rm -f vc-platform vc-db >/dev/null 2>&1 || true
        docker network rm vc-smoke >/dev/null 2>&1 || true

